<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login">Sign In</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__inner">
                <a href="index.html" class="logo">
                    <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="64" height="64" rx="12" fill="#6366f1"/>
                        <path d="M32 14C24 14 18 20 18 28c0 4 1.5 7.5 4 10l-2 10h8l2-8h4l2 8h8l-2-10c2.5-2.5 4-6 4-10 0-8-6-14-14-14z" fill="white" opacity="0.95"/>
                        <circle cx="28" cy="27" r="2.5" fill="#6366f1"/>
                        <circle cx="36" cy="27" r="2.5" fill="#6366f1"/>
                        <path d="M27 33 Q32 38 37 33" stroke="#6366f1" stroke-width="2" fill="none" stroke-linecap="round"/>
                    </svg>
                    <span data-i18n="app.title">Lost & Found</span>
                </a>
                <div class="header__actions">
                    <button class="icon-btn" id="themeToggle" title="Toggle theme">◐</button>
                    <button class="icon-btn" id="langToggle" title="Switch language">EN</button>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container container--narrow">
            <div class="auth-card">
                <h1 class="auth-card__title" data-i18n="login">Войти</h1>
                <p class="auth-card__subtitle">
                    <span data-i18n="no.account">Нет аккаунта?</span>
                    <a href="register.html" data-i18n="register">Зарегистрироваться</a>
                </p>

                <form id="loginForm">
                    <div class="form__group">
                        <label for="email" class="form__label" data-i18n="email">Email</label>
                        <input type="email" id="email" name="email" class="form__input" data-i18n-placeholder="email.placeholder" placeholder="your@email.com" required>
                    </div>

                    <div class="form__group">
                        <label for="password" class="form__label" data-i18n="password">Пароль</label>
                        <input type="password" id="password" name="password" class="form__input" data-i18n-placeholder="password.placeholder" placeholder="Введите пароль" required>
                    </div>

                    <button type="submit" class="btn btn--primary btn--lg btn--full" data-i18n="sign.in">Войти</button>
                </form>

                <div id="errorMessage" class="alert alert--error" style="display: none; margin-top: 16px;"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container"><p data-i18n="footer.text">Campus Lost & Found</p></div>
    </footer>

    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
