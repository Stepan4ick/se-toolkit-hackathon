<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="admin.panel">Admin Panel</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__inner">
                <a href="index.html" class="logo">
                    <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="64" height="64" rx="12" fill="#6366f1"/>
                        <path d="M32 14C24 14 18 20 18 28c0 4 1.5 7.5 4 10l-2 10h8l2-8h4l2 8h8l-2-10c2.5-2.5 4-6 4-10 0-8-6-14-14-14z" fill="white" opacity="0.95"/>
                        <circle cx="28" cy="27" r="2.5" fill="#6366f1"/>
                        <circle cx="36" cy="27" r="2.5" fill="#6366f1"/>
                        <path d="M27 33 Q32 38 37 33" stroke="#6366f1" stroke-width="2" fill="none" stroke-linecap="round"/>
                    </svg>
                    <span data-i18n="app.title">Lost & Found</span>
                </a>
                <div class="header__actions">
                    <button class="icon-btn" id="themeToggle" title="Toggle theme">
                        <svg class="theme-icon theme-icon-sun" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                        <svg class="theme-icon theme-icon-moon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="langToggle" title="Switch language">EN</button>
                    <a href="create.html" class="btn btn--primary btn--sm" data-i18n="create.post">+ Создать</a>
                    <button class="btn btn--ghost btn--sm" id="logoutBtn" data-i18n="logout">Выйти</button>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container container--wide">
            <div class="admin-header">
                <h1 class="admin-header__title" data-i18n="admin.panel">Панель администратора</h1>
                <a href="index.html" class="btn btn--secondary btn--sm" data-i18n="back.to.list">← К списку</a>
            </div>

            <div class="admin-section">
                <h2 class="admin-section__title" data-i18n="admin.users">👥 Пользователи</h2>
                <div id="usersList" class="user-list"></div>
                <div id="emptyUsers" class="empty-state" style="display: none;">
                    <p class="empty-state__text" data-i18n="admin.no.users">Нет зарегистрированных пользователей</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container"><p data-i18n="footer.text">Campus Lost & Found</p></div>
    </footer>

    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
