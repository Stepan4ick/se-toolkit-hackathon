<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title">Lost & Found</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__inner">
                <a href="index.html" class="logo">
                    <svg class="logo-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="64" height="64" rx="12" fill="#6366f1"/>
                        <path d="M32 14C24 14 18 20 18 28c0 4 1.5 7.5 4 10l-2 10h8l2-8h4l2 8h8l-2-10c2.5-2.5 4-6 4-10 0-8-6-14-14-14z" fill="white" opacity="0.95"/>
                        <circle cx="28" cy="27" r="2.5" fill="#6366f1"/>
                        <circle cx="36" cy="27" r="2.5" fill="#6366f1"/>
                        <path d="M27 33 Q32 38 37 33" stroke="#6366f1" stroke-width="2" fill="none" stroke-linecap="round"/>
                    </svg>
                    <span data-i18n="app.title">Lost & Found</span>
                </a>
                <div class="header__actions">
                    <button class="icon-btn" id="themeToggle" title="Toggle theme">
                        <svg class="theme-icon theme-icon-sun" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"/>
                            <line x1="12" y1="1" x2="12" y2="3"/>
                            <line x1="12" y1="21" x2="12" y2="23"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="1" y1="12" x2="3" y2="12"/>
                            <line x1="21" y1="12" x2="23" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                        <svg class="theme-icon theme-icon-moon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="langToggle" title="Switch language">EN</button>
                    <div id="authLinks" style="display:flex;gap:8px;align-items:center;">
                        <a href="login.html" class="btn btn--ghost btn--sm" data-i18n="login">Войти</a>
                        <a href="register.html" class="btn btn--primary btn--sm" data-i18n="register">Регистрация</a>
                    </div>
                    <div id="userLinks" style="display:none;gap:8px;align-items:center;">
                        <a href="admin.html" class="btn btn--ghost btn--sm" id="adminLink" style="display:none;" data-i18n="admin.panel">Админ</a>
                        <a href="create.html" class="btn btn--primary btn--sm" data-i18n="create.post">+ Создать</a>
                        <button class="btn btn--ghost btn--sm" id="logoutBtn" data-i18n="logout">Выйти</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="search-section">
                <h1 class="page-title" data-i18n="main.title">Поиск потерянных и найденных вещей</h1>
                <div class="search-bar">
                    <input type="text" id="searchInput" class="search-bar__input" data-i18n-placeholder="search.placeholder" placeholder="Поиск по названию или описанию...">
                    
                    <div class="custom-select" id="typeFilter">
                        <button type="button" class="custom-select__trigger">
                            <span class="custom-select__value" data-i18n="all.types">Все типы</span>
                            <svg class="custom-select__arrow" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1l4 4 4-4"/></svg>
                        </button>
                        <div class="custom-select__dropdown">
                            <div class="custom-select__option" data-value="" data-i18n="all.types">Все типы</div>
                            <div class="custom-select__option" data-value="lost" data-i18n="lost">Потеряно</div>
                            <div class="custom-select__option" data-value="found" data-i18n="found">Найдено</div>
                        </div>
                    </div>

                    <div class="custom-select" id="categoryFilter">
                        <button type="button" class="custom-select__trigger">
                            <span class="custom-select__value" data-i18n="all.categories">Все категории</span>
                            <svg class="custom-select__arrow" width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 1l4 4 4-4"/></svg>
                        </button>
                        <div class="custom-select__dropdown">
                            <div class="custom-select__option" data-value="" data-i18n="all.categories">Все категории</div>
                            <div class="custom-select__option" data-value="electronics" data-i18n="cat.electronics">Электроника</div>
                            <div class="custom-select__option" data-value="documents" data-i18n="cat.documents">Документы</div>
                            <div class="custom-select__option" data-value="clothing" data-i18n="cat.clothing">Одежда</div>
                            <div class="custom-select__option" data-value="accessories" data-i18n="cat.accessories">Аксессуары</div>
                            <div class="custom-select__option" data-value="other" data-i18n="cat.other">Другое</div>
                        </div>
                    </div>
                    
                    <button id="searchBtn" class="btn btn--secondary" data-i18n="search">Найти</button>
                </div>
            </section>

            <section class="posts-section">
                <div id="postsList" class="posts-grid"></div>
                <div id="emptyState" class="empty-state" style="display: none;">
                    <div class="empty-state__icon">📭</div>
                    <h3 class="empty-state__title" data-i18n="empty.title">Объявлений не найдено</h3>
                    <p class="empty-state__text" data-i18n="empty.text">Попробуйте изменить параметры поиска</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p data-i18n="footer.text">Campus Lost & Found</p>
        </div>
    </footer>

    <script src="js/theme.js?v=2"></script>
    <script src="js/i18n.js?v=2"></script>
    <script src="js/auth.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
    <script src="js/index.js?v=2"></script>
</body>
</html>
