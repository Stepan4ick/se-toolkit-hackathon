<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results - QuizGen</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>🧠 QuizGen</h1>
            <p class="subtitle">Quiz Results</p>
        </div>
    </header>

    <main class="container">
        <section class="results-summary">
            <div class="score-circle">
                <span id="score-display">0/0</span>
            </div>
            <p id="score-percentage" class="score-percentage">0%</p>
            <p id="score-message" class="score-message"></p>
        </section>

        <section class="results-details">
            <h2>Detailed Review</h2>
            <div id="details-container">
                <p>Loading details...</p>
            </div>
        </section>

        <div class="results-actions">
            <a href="index.html" class="btn btn-secondary">← Create New Quiz</a>
            <button id="retake-btn" class="btn btn-primary">Retake Quiz 🔄</button>
        </div>
    </main>

    <script src="js/results.js"></script>
</body>
</html>
